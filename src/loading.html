<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'">
<title>AFJORD</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #0A0A0B;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  font-family: 'IBM Plex Mono', monospace;
  user-select: none;
}

/* Grid background */
.grid-bg {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(240,194,48,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(240,194,48,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

/* Particles */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(240,194,48,0.15);
  animation: float linear infinite;
}

@keyframes float {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.3; }
  100% { transform: translateY(-20px) scale(1.2); opacity: 0; }
}

/* Radar sweep */
.radar {
  position: absolute;
  width: 320px; height: 320px;
  border-radius: 50%;
  border: 1px solid rgba(240,194,48,0.08);
  z-index: 0;
}
.radar::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    transparent 0deg,
    rgba(240,194,48,0.12) 30deg,
    transparent 60deg
  );
  animation: radarSweep 3s linear infinite;
}
.radar-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(240,194,48,0.06);
}
.radar-ring-1 { width: 240px; height: 240px; }
.radar-ring-2 { width: 160px; height: 160px; }
.radar-ring-3 { width: 80px; height: 80px; }

@keyframes radarSweep {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* Scene */
.scene {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  z-index: 1;
  width: 320px; height: 320px;
}

/* Central logo */
.logo-wrap {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; gap: 20px;
  animation: logoIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

@keyframes logoIn {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.logo-box {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, #F0C230, #FFD95C);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  box-shadow:
    0 0 40px rgba(240,194,48,0.4),
    0 0 80px rgba(240,194,48,0.15),
    inset 0 1px 0 rgba(255,255,255,0.2);
  animation: logoPulse 2.5s ease-in-out infinite;
}

@keyframes logoPulse {
  0%, 100% { box-shadow: 0 0 40px rgba(240,194,48,0.4), 0 0 80px rgba(240,194,48,0.15); transform: scale(1); }
  50%       { box-shadow: 0 0 60px rgba(240,194,48,0.6), 0 0 120px rgba(240,194,48,0.3); transform: scale(1.04); }
}

.logo-text {
  font-size: 28px; font-weight: 700;
  color: #0A0A0B; letter-spacing: -1px;
}

.brand-block { text-align: center; }
.brand-name {
  font-size: 20px; font-weight: 700;
  letter-spacing: 8px; color: #F0C230;
  text-transform: uppercase;
}
.brand-sub {
  font-size: 9px; letter-spacing: 4px;
  color: rgba(240,194,48,0.5); text-transform: uppercase;
  margin-top: 4px;
}

/* Progress bar */
.progress-track {
  width: 180px; height: 2px;
  background: rgba(240,194,48,0.1);
  border-radius: 2px; overflow: hidden;
  margin-top: 8px;
}
.progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #F0C230, #FFD95C);
  border-radius: 2px;
  animation: progressSlide 2.5s ease-in-out infinite;
}
@keyframes progressSlide {
  0%   { width: 0%; margin-left: 0%; }
  50%  { width: 60%; margin-left: 20%; }
  100% { width: 0%; margin-left: 100%; }
}

/* Status text */
.status-text {
  font-size: 9px; letter-spacing: 2px;
  color: rgba(255,255,255,0.15);
  text-transform: uppercase;
  animation: statusFade 0.5s ease;
  margin-top: 4px;
}

/* Scan line */
.scanline {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(240,194,48,0.25), transparent);
  animation: scanMove 3.5s linear infinite;
  pointer-events: none; z-index: 0;
}
@keyframes scanMove {
  from { top: 0; }
  to   { top: 100vh; }
}

/* Corner brackets */
.corner {
  position: fixed;
  width: 20px; height: 20px;
  border-color: rgba(240,194,48,0.15);
  border-style: solid;
}
.corner-tl { top: 16px; left: 16px; border-width: 1px 0 0 1px; }
.corner-tr { top: 16px; right: 16px; border-width: 1px 1px 0 0; }
.corner-bl { bottom: 16px; left: 16px; border-width: 0 0 1px 1px; }
.corner-br { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }

/* Version badge */
.version {
  position: fixed; bottom: 20px;
  font-size: 8px; letter-spacing: 2px;
  color: rgba(240,194,48,0.12);
  text-transform: uppercase;
}

/* Exit animation */
body.exiting { animation: exitFade 0.5s ease forwards; }
@keyframes exitFade { to { opacity: 0; transform: scale(1.05); } }
</style>
</head>
<body>

<!-- Background effects -->
<div class="grid-bg"></div>
<div class="particles" id="particles"></div>
<div class="scanline"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Main scene -->
<div class="scene">
  <div class="radar">
    <div class="radar-ring radar-ring-1" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"></div>
    <div class="radar-ring radar-ring-2" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"></div>
    <div class="radar-ring radar-ring-3" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"></div>
  </div>

  <div class="logo-wrap">
    <div class="logo-box">
      <span class="logo-text">AF</span>
    </div>
    <div class="brand-block">
      <div class="brand-name">AFJORD</div>
      <div class="brand-sub">Stealth Acquisition Engine</div>
    </div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="status-text" id="statusText">Initializing</div>
  </div>
</div>

<div class="version" id="versionBadge">Loading...</div>

<script>
// Spawn floating particles
const container = document.getElementById('particles');
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 10 + 3;
  p.style.cssText = `
    width: ${size}px;
    height: ${size}px;
    left: ${Math.random() * 100}%;
    animation-duration: ${Math.random() * 8 + 6}s;
    animation-delay: ${Math.random() * 8}s;
    opacity: ${Math.random() * 0.3 + 0.05};
  `;
  container.appendChild(p);
}

// Cycle status messages
const messages = ['Initializing', 'Loading modules', 'Configuring stealth', 'Preparing engine', 'Almost ready'];
let msgIdx = 0;
const statusEl = document.getElementById('statusText');

setInterval(() => {
  msgIdx = (msgIdx + 1) % messages.length;
  statusEl.style.opacity = '0';
  setTimeout(() => {
    statusEl.textContent = messages[msgIdx];
    statusEl.style.opacity = '1';
    statusEl.style.transition = 'opacity 0.3s';
  }, 150);
}, 700);

// Read version from URL query string
const params = new URLSearchParams(window.location.search);
const version = params.get('version') || '1.0.8';
document.getElementById('versionBadge').textContent = 'v' + version + ' // AFJORD';
</script>
</body>
</html>
